services:
  db:
    image: postgres:16-alpine
    container_name: frd-db
    environment:
      POSTGRES_USER: recruiter_user
      POSTGRES_PASSWORD: recruiter_pass
      POSTGRES_DB: recruiter_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruiter_user -d recruiter_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: frd-backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      ALLOWED_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080"
      AUTH_ENABLED: "false"
      DATABASE_URL: "postgresql://recruiter_user:recruiter_pass@db:5432/recruiter_db"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "http://localhost:8000"
    container_name: frd-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
